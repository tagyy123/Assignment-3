<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Squid Game</title>

  <link rel="stylesheet" href="squid.css">

  <!-- Font Awesome -->
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
</head>

<body>

  <section class="hero">

    <!-- Navbar -->
    <nav class="navbar">
      <div class="logo">
        <img src="squid-game-logo.png" alt="Squid Game Logo">
      </div>

      <ul class="nav-links">
        <li>About</li>
        <li class="active">Watch now</li>
        <li>Actors</li>
        <li>Contact</li>
      </ul>  

      <i class="fa-solid fa-bars"></i>
    </nav>


    <!-- Background Hollow Text -->
    <h1 class="bg-text-left">GAME</h1>
    <h1 class="bg-text-right">SQUID</h1>


    <!-- Main Content -->
    <div class="content">

      <!-- Left Side -->
      <div class="left">

        <div class="title">
          <img src="squid-game-logo.png" alt="Squid Game Logo">
        </div>

        <div class="shapes">
          <span class="shape1"></span>
          <span class="shape2"></span>
        </div>

        <p>
          Action / Thriller / Drama Series directed by Dong-hyuk Hwang
          <br>
          Season 1: 9 Episodes
        </p>

        <div class="buttons">
          <button class="play">
            <i class="fa-solid fa-play"></i>
            Play Now
          </button>

          <button class="trailer">
            <i class="fa-regular fa-circle-play"></i>
            Watch Trailer
          </button>
        </div>

      </div>


      <!-- Right Side -->
      <div class="right">

        <img src="square.png" alt="squid game">

      </div>

    </div>


    <!-- Scroll -->
    <div class="scroll">
      <span>SCROLL</span>
      <div class="line"></div>
    </div>


    <!-- Social Icons -->
    <div class="social">
      <i class="fa-brands fa-twitter"></i>
      <i class="fa-brands fa-instagram"></i>
      <i class="fa-brands fa-facebook-f"></i>
    </div>


    <!-- Bottom Cards -->
    <div class="cards">

      <div class="card">
        <img src="image12.jpeg" alt="">
        <i class="fa-solid fa-play"></i>
      </div>

      <div class="card">
        <img src="image22.jpeg" alt="">
        <i class="fa-solid fa-play"></i>
      </div>

      <div class="card">
        <img src="image3.jpg" alt="">
        <i class="fa-solid fa-play"></i>
      </div>

    </div>

  </section>

</body>
</html>
